<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Lora:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/home.css" />
    <link rel="stylesheet" href="../css/gallery.css" />
    <title>Gallery - Dr. Arun Venkatnathan</title>
  </head>
  <body>
    <nav class="nav">
      <div class="nav-container">
        <div class="logo-container">
          <img src="../images/iiser_logo.png" alt="logo" class="logo" />
          <div class="lab-name">Venkatnathan Labs</div>
        </div>
        <div class="nav-links">
          <a href="../index.html">Dr. Arun Venkatnathan</a>
          <div class="nav-dropdown">
            <a href="#"
              >Research
              <i class="fas fa-chevron-down" style="font-size: 0.7rem"></i
            ></a>
            <div class="dropdown-menu">
              <a href="./research/energy_storage.html"
                >Materials for Energy Storage</a
              >
              <a href="./research/co2_capture.html"
                >Materials for CO2 Capture</a
              >
            </div>
          </div>
          <a href="./group.html">Group</a>
          <a href="./publications.html">Publications</a>
          <a href="./gallery.html">Gallery</a>
          <a href="./news.html">News</a>
        </div>
        <button class="hamburger">
          <span class="line"></span>
          <span class="line"></span>
          <span class="line"></span>
        </button>
      </div>
    </nav>

    <header class="page-header">
      <div class="header-content">
        <h1>GALLERY</h1>
      </div>
    </header>

    <main class="gallery-container">
      <div class="gallery" id="gallery">
        <!-- Images populated by JavaScript -->
      </div>
    </main>

    <footer class="footer">
      <div class="footer-bottom">
        <p>&copy; 2024 Venkatnathan Lab. All rights reserved.</p>
      </div>
    </footer>

    <!-- Modal -->
    <div class="modal" id="modal">
      <div class="modal-content">
        <button class="close-btn" id="closeBtn">&times;</button>
        <button class="nav-btn prev-btn" id="prevBtn">&#8249;</button>
        <img class="modal-image" id="modalImage" src="" alt="Gallery Image" />
        <button class="nav-btn next-btn" id="nextBtn">&#8250;</button>
        <div class="image-counter" id="imageCounter">1 / 24</div>
      </div>
    </div>

    <script>
      const images = [];
      const totalPossibleImages = 50;

      function createGallery() {
        const gallery = document.getElementById("gallery");
        let loadedCount = 0;

        for (let i = 1; i <= totalPossibleImages; i++) {
          const img = new Image();
          const src = `../images/gallery/${i}.jpg`;
          
          img.onload = function() {
            images.push(src);
            const index = images.length - 1;
            
            const galleryItem = document.createElement("div");
            galleryItem.className = "gallery-item";
            galleryItem.innerHTML = `<img src="${src}" alt="Gallery Image" loading="lazy" />`;
            galleryItem.addEventListener("click", () => {
              const currentIdx = images.indexOf(src);
              openModal(currentIdx);
            });
            gallery.appendChild(galleryItem);
          };
          
          img.onerror = function() {
            // Image doesn't exist, skip it silentlly
          };
          
          img.src = src;
        }
      }

      function updateCounterDisplay() {
        if (modal.classList.contains("active")) {
          imageCounter.textContent = `${currentImageIndex + 1} / ${images.length}`;
        }
      }

      let currentImageIndex = 0;

      const modal = document.getElementById("modal");
      const modalImage = document.getElementById("modalImage");
      const closeBtn = document.getElementById("closeBtn");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      const imageCounter = document.getElementById("imageCounter");

      function openModal(index) {
        currentImageIndex = index;
        updateModalImage();
        modal.classList.add("active");
        document.body.style.overflow = "hidden";
      }

      function closeModal() {
        modal.classList.remove("active");
        document.body.style.overflow = "auto";
      }

      function updateModalImage() {
        modalImage.src = images[currentImageIndex];
        imageCounter.textContent = `${currentImageIndex + 1} / ${
          images.length
        }`;
      }

      function showPrevImage() {
        currentImageIndex =
          (currentImageIndex - 1 + images.length) % images.length;
        updateModalImage();
      }

      function showNextImage() {
        currentImageIndex = (currentImageIndex + 1) % images.length;
        updateModalImage();
      }

      closeBtn.addEventListener("click", closeModal);
      prevBtn.addEventListener("click", showPrevImage);
      nextBtn.addEventListener("click", showNextImage);

      modal.addEventListener("click", (e) => {
        if (e.target === modal) {
          closeModal();
        }
      });

      document.addEventListener("keydown", (e) => {
        if (!modal.classList.contains("active")) return;
        switch (e.key) {
          case "Escape":
            closeModal();
            break;
          case "ArrowLeft":
            showPrevImage();
            break;
          case "ArrowRight":
            showNextImage();
            break;
        }
      });

      let touchStartX = 0;
      let touchEndX = 0;

      modalImage.addEventListener("touchstart", (e) => {
        touchStartX = e.changedTouches[0].screenX;
      });

      modalImage.addEventListener("touchend", (e) => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
      });

      function handleSwipe() {
        const swipeThreshold = 50;
        const diff = touchStartX - touchEndX;

        if (Math.abs(diff) > swipeThreshold) {
          if (diff > 0) {
            showNextImage();
          } else {
            showPrevImage();
          }
        }
      }

      const hamburger = document.querySelector(".hamburger");
      const navLinks = document.querySelector(".nav-links");
      const navDropdown = document.querySelector(".nav-dropdown");

      if (hamburger && navLinks) {
        hamburger.addEventListener("click", () => {
          hamburger.classList.toggle("active");
          navLinks.classList.toggle("active");
        });
      }

      // Mobile dropdown toggle
      if (navDropdown) {
        navDropdown
          .querySelector(":scope > a")
          .addEventListener("click", (e) => {
            if (window.innerWidth <= 768) {
              e.preventDefault();
              navDropdown.classList.toggle("open");
            }
          });
      }

      document.addEventListener("DOMContentLoaded", createGallery);
    </script>
  </body>
</html>
