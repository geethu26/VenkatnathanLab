<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Publications - Dr. Arun Venkatnathan</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Lora:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/home.css" />
    <link rel="stylesheet" href="../css/publications.css" />
  </head>
  <body>
    <nav class="nav">
      <div class="nav-container">
        <div class="logo-container">
          <img src="../images/iiser_logo.png" alt="logo" class="logo" />
        </div>
        <div class="nav-links">
          <a href="../index.html">Dr. Arun Venkatnathan</a>
          <div class="nav-dropdown">
            <a href="#"
              >Research
              <i class="fas fa-chevron-down" style="font-size: 0.7rem"></i
            ></a>
            <div class="dropdown-menu">
              <a href="./research/energy_storage.html"
                >Materials for Energy Storage</a
              >
              <a href="./research/co2_capture.html"
                >Materials for CO2 Capture</a
              >
            </div>
          </div>
          <a href="./group.html">Group</a>
          <a href="./publications.html">Publications</a>
          <a href="./gallery.html">Gallery</a>
          <a href="./news.html">News</a>
        </div>
        <button class="hamburger">
          <span class="line"></span>
          <span class="line"></span>
          <span class="line"></span>
        </button>
      </div>
    </nav>

    <header class="page-header">
      <div class="header-content">
        <h1>PUBLICATIONS</h1>
      </div>
    </header>

    <main class="publications-container">
      <div class="publications-list" id="publicationsList">
        <!-- Publications will be dynamically inserted here by JavaScript -->
      </div>
    </main>

    <footer class="footer">
      <div class="footer-bottom">
        <p>&copy; <span id="year"></span> Venkatnathan Lab. All rights reserved.</p>
      </div>
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
    <script src="../js/publications.js"></script>

    <script>
      // Hamburger menu functionality
      const hamburger = document.querySelector(".hamburger");
      const navLinks = document.querySelector(".nav-links");
      const navDropdown = document.querySelector(".nav-dropdown");
      if (hamburger && navLinks) {
        hamburger.addEventListener("click", () => {
          hamburger.classList.toggle("active");
          navLinks.classList.toggle("active");
        });
      }
      // Mobile dropdown toggle
      if (navDropdown) {
        navDropdown
          .querySelector(":scope > a")
          .addEventListener("click", (e) => {
            if (window.innerWidth <= 768) {
              e.preventDefault();
              navDropdown.classList.toggle("open");
            }
          });
      }
    </script>
  </body>
</html>
